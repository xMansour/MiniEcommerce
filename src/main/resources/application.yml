server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: ecommerce

  datasource:
    url: jdbc:h2:mem:ecommerce
    username: admin
    password: adminpass
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
